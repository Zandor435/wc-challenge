<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC Challenge — Manager Bios</title>
  <meta name="description" content="Four owners. Four larger-than-life ring personas. The WC Challenge manager bios." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%23e2231a'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-size='15' font-weight='bold' text-anchor='middle' fill='white'%3EWC%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- reuse the site design system (vars, fonts, topbar, flags) -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ============================================================
       BIOS PAGE — WWE.com superstar hero pages, on the WC dark theme.
       ============================================================ */
    body { background: #060607; }

    /* ---- top brand bar (slim, reuses .topbar look) ---- */
    .biobar { position: sticky; top: 0; z-index: 60; background: #000; border-bottom: 1px solid #1a1a1c; }
    .biobar-inner {
      max-width: 1200px; margin: 0 auto; height: 56px; padding: 0 18px;
      display: flex; align-items: center; gap: 18px;
    }
    .biobar .back {
      display: inline-flex; align-items: center; gap: 7px; color: #cfd3da;
      font-size: .8rem; font-weight: 600; transition: color .15s;
    }
    .biobar .back:hover { color: #fff; }
    .biobar .back .arrow { color: var(--red); font-size: 1rem; }

    /* ---- sticky owner jump nav ---- */
    .bionav { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .bionav a {
      --c: #8b919c;
      display: inline-flex; align-items: center; gap: 7px;
      font-family: "Oswald", sans-serif; text-transform: uppercase; letter-spacing: .04em;
      font-size: .76rem; font-weight: 600; color: #aeb3bc;
      padding: 6px 11px; border: 1px solid #23262f; border-radius: 999px;
      transition: color .15s, border-color .15s, background .15s;
    }
    .bionav a::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--c); box-shadow: 0 0 8px var(--c); }
    .bionav a:hover, .bionav a.active { color: #fff; border-color: var(--c); background: rgba(255,255,255,.03); }

    /* ---- page intro ---- */
    .bios-hero {
      max-width: 1200px; margin: 0 auto; padding: 54px 18px 18px;
      text-align: center;
    }
    .bios-hero .kicker {
      font-family: "Oswald", sans-serif; text-transform: uppercase; letter-spacing: .35em;
      font-size: .8rem; color: var(--red); font-weight: 600;
    }
    .bios-hero h1 {
      font-family: "Anton", "Oswald", sans-serif; font-weight: 400;
      font-size: clamp(2.6rem, 8vw, 5.5rem); line-height: .92; margin: .12em 0 .15em;
      letter-spacing: .01em; text-transform: uppercase;
      background: linear-gradient(180deg, #fff 35%, #9aa0ab); -webkit-background-clip: text;
      background-clip: text; color: transparent;
    }
    .bios-hero p { color: var(--muted); max-width: 560px; margin: 0 auto; font-size: .95rem; }

    /* ============ OWNER SECTION ============ */
    .bio {
      --c: #8b919c;
      position: relative; min-height: 100vh;
      display: flex; align-items: center;
      padding: 80px 0; overflow: hidden;
      border-top: 1px solid #14161c;
      scroll-margin-top: 56px;
    }
    /* owner-color atmosphere */
    .bio::before {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(120% 90% at var(--glow-x, 22%) 50%, color-mix(in srgb, var(--c) 26%, transparent) 0%, transparent 55%),
        radial-gradient(140% 120% at 50% 120%, rgba(0,0,0,.6), transparent 60%);
    }
    /* giant ghosted number/word watermark */
    .bio::after {
      content: attr(data-idx); position: absolute; z-index: 0; pointer-events: none;
      right: 3%; bottom: -6%; font-family: "Anton", sans-serif;
      font-size: clamp(12rem, 34vw, 34rem); line-height: .7;
      color: color-mix(in srgb, var(--c) 9%, transparent);
      -webkit-text-stroke: 1px color-mix(in srgb, var(--c) 14%, transparent);
    }

    .bio-inner {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto; padding: 0 18px; width: 100%;
      display: grid; grid-template-columns: minmax(280px, 0.95fr) 1.05fr;
      gap: clamp(24px, 5vw, 72px); align-items: center;
    }

    /* ---- portrait (dominant) ---- */
    .bio-portrait { position: relative; }
    .bio-portrait .glow {
      position: absolute; inset: -6% -4%; z-index: 0; border-radius: 24px;
      background: radial-gradient(60% 60% at 50% 40%, color-mix(in srgb, var(--c) 55%, transparent), transparent 70%);
      filter: blur(38px); opacity: .55;
    }
    .bio-portrait img {
      position: relative; z-index: 1; width: 100%; display: block;
      border-radius: 16px;
      aspect-ratio: 3 / 4; object-fit: cover; object-position: top center;
      box-shadow: 0 30px 70px rgba(0,0,0,.65), 0 0 0 1px color-mix(in srgb, var(--c) 35%, #000);
    }
    .bio-portrait .tier1-badge {
      position: absolute; z-index: 2; left: 14px; bottom: 14px;
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(8,9,12,.82); backdrop-filter: blur(6px);
      border: 1px solid color-mix(in srgb, var(--c) 45%, #000);
      padding: 7px 12px 7px 9px; border-radius: 999px; font-size: .78rem; font-weight: 700;
    }
    .bio-portrait .tier1-badge .lbl { color: var(--c); font-family: "Oswald",sans-serif; letter-spacing: .05em; }

    /* ---- text/content side ---- */
    .bio-main { min-width: 0; }
    .bio-persona {
      display: inline-block; font-family: "Oswald", sans-serif; text-transform: uppercase;
      letter-spacing: .22em; font-size: .8rem; font-weight: 600; color: var(--c);
      padding-bottom: 10px;
    }
    .bio-ringname {
      font-family: "Anton", "Oswald", sans-serif; font-weight: 400; text-transform: uppercase;
      font-size: clamp(2.7rem, 7.5vw, 6rem); line-height: .9; margin: 0;
      letter-spacing: .005em;
      background: linear-gradient(180deg, #ffffff 30%, color-mix(in srgb, var(--c) 65%, #6b7079));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 40px color-mix(in srgb, var(--c) 25%, transparent);
    }
    .bio-realname {
      display: block; margin-top: 10px; color: var(--muted);
      font-size: 1rem; font-weight: 500;
    }
    .bio-realname b { color: var(--text); font-weight: 700; }

    /* ---- stat strip ---- */
    .bio-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
      margin: 26px 0 0; background: #1a1d25; border: 1px solid #1a1d25; border-radius: 10px; overflow: hidden;
    }
    .stat { background: var(--surface); padding: 13px 14px; }
    .stat .k { font-size: .66rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted-2); font-weight: 700; }
    .stat .v { font-family: "Oswald", sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.1; margin-top: 3px; }
    .stat .v small { font-size: .8rem; color: var(--muted); font-weight: 500; }
    .stat.accent .v { color: var(--c); }

    /* ---- roster (tiered team chips) ---- */
    .bio-roster { margin-top: 18px; display: flex; flex-direction: column; gap: 9px; }
    .roster-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .roster-row .tlabel {
      font-family: "Oswald", sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .06em;
      color: var(--muted-2); width: 58px; flex: none; text-transform: uppercase;
    }
    .team-chip {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--surface-2); border: 1px solid var(--line);
      padding: 5px 11px 5px 8px; border-radius: 999px; font-size: .82rem; font-weight: 600;
    }
    .team-chip.t1 { border-color: color-mix(in srgb, var(--c) 50%, #000); background: color-mix(in srgb, var(--c) 12%, var(--surface-2)); }

    /* ---- moves ---- */
    .bio-moves { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .move {
      border: 1px solid var(--line); border-left: 3px solid var(--c); border-radius: 8px;
      padding: 12px 14px; background: var(--surface);
    }
    .move .k { font-size: .66rem; text-transform: uppercase; letter-spacing: .12em; color: var(--c); font-weight: 700; }
    .move .v { font-family: "Oswald", sans-serif; font-size: 1.12rem; font-weight: 600; color: var(--text); margin-top: 4px; line-height: 1.15; }

    /* ---- bio body ---- */
    .bio-content { margin-top: 24px; }
    .bio-content b { color: var(--c); font-weight: 800; }
    .bio-lead {
      margin: 0; color: #e8eaee; font-size: 1.02rem; line-height: 1.62;
      border-left: 3px solid var(--c); padding-left: 16px;
    }

    /* Manager Rating — distinct stat-bar block */
    .bio-ratings {
      margin-top: 20px; padding: 16px 18px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--c) 9%, var(--surface)), var(--surface));
      border: 1px solid color-mix(in srgb, var(--c) 30%, var(--line)); border-radius: 10px;
    }
    .ratings-label {
      display: block; font-family: "Oswald", sans-serif; text-transform: uppercase;
      letter-spacing: .2em; font-size: .74rem; font-weight: 700; color: var(--c); margin-bottom: 12px;
    }
    .ratings-grid { display: grid; gap: 9px; }
    .rating { display: grid; grid-template-columns: 92px 1fr 26px; align-items: center; gap: 12px; }
    .r-name {
      font-family: "Oswald", sans-serif; text-transform: uppercase; letter-spacing: .04em;
      font-size: .8rem; font-weight: 600; color: var(--muted); white-space: nowrap;
    }
    .r-bar { height: 9px; border-radius: 999px; background: #0c0d11; box-shadow: inset 0 0 0 1px var(--line); overflow: hidden; }
    .r-fill {
      display: block; height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--c) 55%, #000), var(--c));
      box-shadow: 0 0 10px color-mix(in srgb, var(--c) 60%, transparent);
    }
    .r-val { font-family: "Oswald", sans-serif; font-weight: 700; font-size: .95rem; color: var(--text); text-align: right; }

    /* bullets */
    .bio-bullets { list-style: none; margin: 20px 0 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }
    .bio-bullets li {
      position: relative; padding-left: 22px; color: #c7ccd4; font-size: .92rem; line-height: 1.5;
    }
    .bio-bullets li::before {
      content: "›"; position: absolute; left: 4px; top: -1px;
      color: var(--c); font-weight: 800; font-size: 1.05rem;
    }

    /* rival */
    .bio-rival {
      margin-top: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 16px; border-radius: 10px;
      background: color-mix(in srgb, var(--c) 8%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--c) 28%, var(--line));
    }
    .rival-tag {
      flex: none; font-family: "Oswald", sans-serif; text-transform: uppercase; letter-spacing: .14em;
      font-size: .72rem; font-weight: 700; color: #0a0a0b; background: var(--c);
      padding: 4px 10px; border-radius: 999px;
    }
    .rival-text { color: #d7dbe2; font-size: .92rem; font-weight: 500; }

    /* ---- alternating layout (portrait right on even sections) ---- */
    .bio:nth-child(even) .bio-inner { grid-template-columns: 1.05fr minmax(280px, 0.95fr); }
    .bio:nth-child(even) .bio-portrait { order: 2; }
    .bio:nth-child(even) .bio-main { order: 1; }
    .bio:nth-child(even) { --glow-x: 78%; }
    .bio:nth-child(even)::after { right: auto; left: 3%; }

    /* desktop: pin the dominant portrait in view while reading the bio */
    @media (min-width: 861px) {
      .bio-inner { align-items: start; }
      .bio-portrait { position: sticky; top: 72px; align-self: start; }
    }

    .bios-foot { text-align: center; color: var(--muted-2); font-size: .8rem; padding: 40px 18px 60px; border-top: 1px solid #14161c; }
    .bios-foot a { color: var(--muted); }
    .bios-foot a:hover { color: #fff; }

    /* ============ MOBILE ============ */
    @media (max-width: 860px) {
      .bio { min-height: auto; padding: 56px 0; }
      .bio-inner,
      .bio:nth-child(even) .bio-inner { grid-template-columns: 1fr; gap: 26px; }
      .bio-portrait, .bio:nth-child(even) .bio-portrait { order: 1; }
      .bio-main, .bio:nth-child(even) .bio-main { order: 2; }
      .bio-portrait img { max-width: 420px; margin: 0 auto; }
      .bionav { width: 100%; margin: 0; justify-content: center; }
      .biobar-inner { height: auto; flex-wrap: wrap; padding: 10px 14px; gap: 10px; }
    }
    @media (max-width: 460px) {
      .bio-stats { grid-template-columns: 1fr 1fr; }
      .bio-moves { grid-template-columns: 1fr; }
      .roster-row .tlabel { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <header class="biobar">
    <div class="biobar-inner">
      <a class="back" href="index.html#portfolios"><span class="arrow">←</span> <span class="brand"><span class="brand-mark">WC</span><span class="brand-word">CHALLENGE</span></span></a>
      <nav class="bionav" id="bionav" aria-label="Owners"></nav>
    </div>
  </header>

  <!-- ============ INTRO ============ -->
  <div class="bios-hero">
    <div class="kicker">WC Challenge · 2026</div>
    <h1>Meet the Managers</h1>
    <p>Four owners. Four larger-than-life ring personas. Tale of the tape, live from the World Cup pool.</p>
  </div>

  <!-- ============ OWNER SECTIONS (rendered by script) ============ -->
  <main id="bios"></main>

  <footer class="bios-foot">
    <p>Live stats pulled from the pool · <a href="index.html">Back to the leaderboard →</a></p>
  </footer>

  <script>
  /* ---------- owner profiles (ring personas, rosters, moves, bios) ----------
     Numbers (record / points / win %) are pulled live from the JSON below.
     Bio lead/bullets allow inline <b>…</b> for emphasis (authored, trusted HTML);
     ratings are on a 0–10 scale and render as owner-color stat bars. */
  const OWNER_COLORS = { Zach: "#f4c430", Gunner: "#2f6dff", Gayden: "#28c060", Devin: "#f0743a" };

  const PROFILES = [
    {
      id: "zach", owner: "Zach", color: OWNER_COLORS.Zach,
      ringName: "MUSTARD BOY", realName: "Zach", persona: "The Hulkster · Hulkamania",
      portrait: "assets/portraits/wwe/zach_wwe.jpg",
      tiers: { 1: ["Brazil"], 2: ["Switzerland", "Austria"], 3: ["Ghana", "Czechia"], 4: ["Saudi Arabia"] },
      signature: "The Overthink — stares at a spreadsheet so long his opponent falls asleep",
      finisher: "The 20K Simulation — locks you in a submission hold, runs the numbers, and determines he was going to lose anyway",
      bio: {
        lead: `<b>OH YEAH</b>, forged in the aisles of a Baton Rouge grocery store, where his own brother — <b>HIS OWN FLESH AND BLOOD</b> — walked him straight into a mustard display like a guided missile. Every bottle hit the floor. Yellow everywhere. A legend was born. Now this man runs 20,000 computer simulations before breakfast and <b>STILL has the worst odds in the building.</b>`,
        ratings: { Research: 10, Confidence: 6, Vibes: 8, "Trash Talk": 7, Delusion: 9 },
        bullets: [
          `Once almost drafted Italy. <b>Italy is not in the tournament.</b> His cousin Gunner watched him do it and said nothing for two full minutes.`,
          `Has built an entire website, automated pipeline, and AI-generated portraits for a <b>$10 bet</b>. The ROI will never recover.`,
          `His two daughters have a better chance of picking a winning roster by pointing at flags.`,
        ],
        rival: `Gunner — built the whole system and Gunner's still going to win with it.`,
      },
    },
    {
      id: "gunner", owner: "Gunner", color: OWNER_COLORS.Gunner,
      ringName: "BUBBA G", realName: "Gunner", persona: "The Macho Man · Slim Jim Energy",
      portrait: "assets/portraits/wwe/gunner_wwe.jpg",
      tiers: { 1: ["France"], 2: ["Senegal", "Morocco"], 3: ["Egypt", "Canada"], 4: ["DR Congo"] },
      signature: "The Quiet Troll — whispers incorrect information to a family member and watches them self-destruct",
      finisher: "The 30.4% — simply exists while the simulation does the rest",
      bio: {
        lead: `From the swamps of Birmingham to the silence of a man who already knows he's won. <b>The youngest. The quietest. The most dangerous.</b> This man played college soccer, knows every squad rotation, every group of death, every dark horse — and when draft day came, he sat back, said almost nothing, and walked out with the best roster in the league. He also once wore a Brasil jacket as a child. <b>He did not draft Brazil.</b>`,
        ratings: { Research: 10, Confidence: 10, Vibes: 3, "Trash Talk": 4, Delusion: 0 },
        bullets: [
          `Told Zach that Italy was in the tournament. Watched him believe it. Never corrected him. <b>Waited.</b>`,
          `Is a physical therapist by trade, which is fitting because the other three managers are going to need rehab after this.`,
          `Loves fishing. Catches bass with the same patience he used to reel in France at pick two.`,
        ],
        rival: `Zach — the commissioner built the whole game and Gunner's about to take his money with it.`,
      },
    },
    {
      id: "gayden", owner: "Gayden", color: OWNER_COLORS.Gayden,
      ringName: "THE BACKPASS ASSASSIN", realName: "Gayden", persona: "Legion of Doom · Road Warrior",
      portrait: "assets/portraits/wwe/gayden_wwe.jpg",
      tiers: { 1: ["England"], 2: ["Japan", "Ivory Coast"], 3: ["Korea Republic", "Turkey"], 4: ["Jordan"] },
      signature: "The Armbar — threatens physical violence when losing an argument about soccer",
      finisher: "The Sideways Pass — moves laterally with such force that absolutely nothing is accomplished",
      bio: {
        lead: `<b>FIFTY-TWO YEARS OLD.</b> The oldest warrior in the ring. A former Furman Paladin who played college soccer before most of these managers were born, and he wants you to <b>KNOW</b> about it. This man does jiu jitsu, rides motorcycles, hunts, fishes, and will absolutely threaten to put you in a rear naked choke if you question his draft strategy. He has trained under the legendary Michael Bradley — a player so visionary, so transcendent, that he completed more sideways passes than any American in history. <b>THE CROWD BOOS. HE DOESN'T CARE.</b>`,
        ratings: { Research: 5, Confidence: 10, Vibes: 9, "Trash Talk": 10, Delusion: 8 },
        bullets: [
          `Genuinely believes Michael Bradley was good. Has been wrong about this for over a decade. Will not stop.`,
          `Drafted Korea Republic and Turkey in T3 and called it "savvy." The Monte Carlo called it "statistically unremarkable."`,
          `Once walked his little brother into a mustard display on purpose. <b>Created a supervillain.</b>`,
        ],
        rival: `Everyone — but especially anyone who disrespects Michael Bradley.`,
      },
    },
    {
      id: "devin", owner: "Devin", color: OWNER_COLORS.Devin,
      ringName: "GHOST PEPPER", realName: "Devin", persona: "The Ultimate Warrior",
      portrait: "assets/portraits/wwe/devin_wwe.jpg",
      tiers: { 1: ["Spain"], 2: ["USA", "Norway"], 3: ["South Africa", "Bosnia"], 4: ["Haiti"] },
      signature: "The Just Wait — makes an indefensible decision and tells everyone to be patient",
      finisher: "The Ghost Pepper — charges in with maximum confidence, immediately regrets everything",
      bio: {
        lead: `This man once looked at a pepper and said "I can eat that." He could not eat that. It was a ghost pepper. He panicked. He sweated. He questioned every decision that led him to that moment. <b>AND THEN HE DID THE EXACT SAME THING ON DRAFT DAY.</b> Looked at Haiti in Tier 4 and said "I can draft that." Everyone laughed. He said "just wait." <b>We are still waiting.</b>`,
        ratings: { Research: 4, Confidence: 9, Vibes: 10, "Trash Talk": 5, Delusion: 8 },
        bullets: [
          `Has Spain and USA, which is genuinely solid. Then you scroll down to South Africa, Bosnia, and Haiti and realize the first two picks were an accident.`,
          `The only boy with three sisters. Has been outnumbered his entire life. Now has three kids and one on the way. <b>Still outnumbered.</b>`,
          `Auburn grad whose dad played football at LSU. Can't pick a side in anything — including which hemisphere to draft from.`,
        ],
        rival: `The concept of research — they've never met.`,
      },
    },
  ];

  /* ---------- flags (teams used on this page) ---------- */
  const TEAM_FLAGS = {
    Brazil:"br", Switzerland:"ch", Austria:"at", Ghana:"gh", Czechia:"cz", "Saudi Arabia":"sa",
    France:"fr", Senegal:"sn", Morocco:"ma", Egypt:"eg", Canada:"ca", "DR Congo":"cd",
    England:"gb-eng", Japan:"jp", "Ivory Coast":"ci", "Korea Republic":"kr", Turkey:"tr", Jordan:"jo",
    Spain:"es", USA:"us", Norway:"no", "South Africa":"za", Bosnia:"ba", Haiti:"ht",
  };
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
  function flag(team) {
    const code = TEAM_FLAGS[team];
    if (!code) return "";
    return `<img class="flag" src="https://flagcdn.com/24x18/${code}.png" `
         + `srcset="https://flagcdn.com/48x36/${code}.png 2x" width="24" height="18" alt="" loading="lazy" />`;
  }
  async function loadJSON(path) {
    try { const r = await fetch(path + "?v=" + Date.now()); return r.ok ? await r.json() : null; }
    catch { return null; }
  }

  function chip(team, t1 = false) {
    return `<span class="team-chip${t1 ? " t1" : ""}">${flag(team)}${esc(team)}</span>`;
  }
  function rosterHTML(tiers) {
    const labels = { 1: "Tier 1", 2: "Tier 2", 3: "Tier 3", 4: "Tier 4" };
    return [1, 2, 3, 4].map((t) => {
      const teams = tiers[t] || [];
      if (!teams.length) return "";
      return `<div class="roster-row"><span class="tlabel">${labels[t]}</span>`
           + teams.map((tm) => chip(tm, t === 1)).join("") + `</div>`;
    }).join("");
  }

  /* bio body — lead paragraph, Manager Rating bars, bullets, rival.
     lead/bullets/rival are authored HTML (allow <b>…</b>); not escaped by design. */
  function bioHTML(b) {
    if (!b) return "";
    const ratings = Object.entries(b.ratings || {}).map(([k, v]) => {
      const pct = Math.max(0, Math.min(10, +v)) * 10;
      return `<div class="rating">
                <span class="r-name">${esc(k)}</span>
                <span class="r-bar"><span class="r-fill" style="width:${pct}%"></span></span>
                <span class="r-val">${esc(v)}</span>
              </div>`;
    }).join("");
    const bullets = (b.bullets || []).map((t) => `<li>${t}</li>`).join("");
    return `
      <div class="bio-content">
        ${b.lead ? `<p class="bio-lead">${b.lead}</p>` : ""}
        ${ratings ? `<div class="bio-ratings">
            <span class="ratings-label">Manager Rating</span>
            <div class="ratings-grid">${ratings}</div>
          </div>` : ""}
        ${bullets ? `<ul class="bio-bullets">${bullets}</ul>` : ""}
        ${b.rival ? `<div class="bio-rival"><span class="rival-tag">Rival</span><span class="rival-text">${b.rival}</span></div>` : ""}
      </div>`;
  }

  function sectionHTML(p, idx, stats) {
    const t1 = (p.tiers[1] || [])[0];
    return `
      <section class="bio" id="${p.id}" data-idx="${idx + 1}" style="--c:${p.color}">
        <div class="bio-inner">
          <div class="bio-portrait">
            <span class="glow"></span>
            <img src="${p.portrait}" alt="${esc(p.owner)} as ${esc(p.ringName)}" loading="lazy"
                 onerror="this.style.opacity=.25" />
            ${t1 ? `<span class="tier1-badge"><span class="lbl">T1</span> ${flag(t1)}${esc(t1)}</span>` : ""}
          </div>
          <div class="bio-main">
            <span class="bio-persona">${esc(p.persona)}</span>
            <h2 class="bio-ringname">${esc(p.ringName)}</h2>
            <span class="bio-realname">Real name &nbsp;<b>${esc(p.realName)}</b></span>

            <div class="bio-stats">
              <div class="stat"><div class="k">Record (W-D-L)</div><div class="v">${stats.rec}</div></div>
              <div class="stat accent"><div class="k">Current Points</div><div class="v">${stats.pts}</div></div>
              <div class="stat accent"><div class="k">Win Probability</div><div class="v">${stats.win}</div></div>
            </div>

            <div class="bio-roster">${rosterHTML(p.tiers)}</div>

            <div class="bio-moves">
              <div class="move"><div class="k">Signature Move</div><div class="v">${esc(p.signature)}</div></div>
              <div class="move"><div class="k">Finishing Move</div><div class="v">${esc(p.finisher)}</div></div>
            </div>

            ${bioHTML(p.bio)}
          </div>
        </div>
      </section>`;
  }

  function navHTML() {
    return PROFILES.map((p) =>
      `<a href="#${p.id}" style="--c:${p.color}" data-id="${p.id}">${esc(p.owner)}</a>`).join("");
  }

  async function main() {
    const [standings, teams, timeline] = await Promise.all([
      loadJSON("data/owner_standings.json"),
      loadJSON("data/team_table.json"),
      loadJSON("data/timeline.json"),
    ]);

    // points per owner
    const pts = {};
    (standings?.standings || []).forEach((r) => { pts[r.owner] = r.total_points; });

    // record per owner = sum of W-D-L across their drafted teams
    const rec = {};
    (teams?.teams || []).forEach((t) => {
      const r = rec[t.owner] || (rec[t.owner] = { W: 0, D: 0, L: 0 });
      r.W += t.W || 0; r.D += t.D || 0; r.L += t.L || 0;
    });

    // win probability = latest timeline entry
    const wp = {};
    if (Array.isArray(timeline) && timeline.length) {
      const last = [...timeline].sort((a, b) =>
        String(a.date).localeCompare(String(b.date)) || (a.matchday || 0) - (b.matchday || 0)
      ).pop();
      Object.entries(last.win_probability || {}).forEach(([o, v]) => { wp[o] = v; });
    }

    const statsFor = (owner) => {
      const r = rec[owner];
      return {
        rec: r ? `${r.W}-${r.D}-${r.L}` : "0-0-0",
        pts: pts[owner] != null ? pts[owner] : "—",
        win: wp[owner] != null ? `${(wp[owner] * 100).toFixed(1)}<small>%</small>` : "—",
      };
    };

    document.getElementById("bionav").innerHTML = navHTML();
    document.getElementById("bios").innerHTML =
      PROFILES.map((p, i) => sectionHTML(p, i, statsFor(p.owner))).join("");

    // scroll-spy: highlight the owner currently in view
    const links = [...document.querySelectorAll(".bionav a")];
    const byId = Object.fromEntries(links.map((a) => [a.dataset.id, a]));
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          links.forEach((a) => a.classList.remove("active"));
          byId[e.target.id]?.classList.add("active");
        }
      });
    }, { rootMargin: "-45% 0px -45% 0px" });
    document.querySelectorAll(".bio").forEach((s) => obs.observe(s));
  }
  main();
  </script>
</body>
</html>
