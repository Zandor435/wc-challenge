  <!-- =====================================================================
       Analytics dashboard — dense tiled grid. All tile styling is scoped
       here (the shared theme file style.css is read-only for this page).
       The 1px "gap lines" are the grid container's own background showing
       through 1px grid gaps; tiles paint over it.
       ===================================================================== -->
  <style>
    /* ---- palette (local to the dashboard) ---- */
    .dash {
      --d-page:   #0c0e14;
      --d-fill:   #111420;
      --d-gap:    #1c2030;
      --d-num:    #e8eaf0;
      --d-label:  #5a6070;
      --d-label2: #8890a4;
      --d-pos:    #3dd9a0;
      --d-neg:    #e05555;
      background: var(--d-page);
      display: flex;
      flex-direction: column;
      gap: 8px;               /* the only space between sections */
      padding-top: 22px;
      padding-bottom: 40px;
    }

    /* ---- grid container = the gap colour; tiles sit on top ---- */
    .dash .grid {
      display: grid;
      gap: 1px;
      background: var(--d-gap);
      border-radius: 8px;
      overflow: hidden;
    }
    .dash .g-race { grid-template-columns: repeat(15, 1fr); } /* LCM(5,3) */
    .dash .g5     { grid-template-columns: repeat(5, 1fr); }
    .dash .g4     { grid-template-columns: repeat(4, 1fr); }
    .dash .g1     { grid-template-columns: 1fr; }

    .dash .tile {
      background: var(--d-fill);
      padding: 14px 15px;
      min-width: 0;            /* let flex/charts shrink inside the cell */
      display: flex;
      flex-direction: column;
    }
    .dash .span3 { grid-column: span 3; }
    .dash .span5 { grid-column: span 5; }

    /* ---- headers ---- */
    .dash .tile-head {
      grid-column: 1 / -1;
      padding: 9px 15px;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
    }
    .dash .sec-head {
      color: var(--d-label);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .dash .sec-sub {
      color: var(--d-label);
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .dash .t-cap {           /* per-tile caption / label */
      color: var(--d-label);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    /* ---- numbers / labels ---- */
    .dash .t-big   { color: var(--d-num); font-size: 30px; font-weight: 700; line-height: 1.05; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .dash .t-mid   { color: var(--d-num); font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .dash .t-label { color: var(--d-label); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .dash .t-sub   { color: var(--d-label2); font-size: 12px; margin-top: 4px; font-variant-numeric: tabular-nums; }
    .dash .num     { font-variant-numeric: tabular-nums; }
    .dash .pos { color: var(--d-pos); }
    .dash .neg { color: var(--d-neg); }
    .dash .neu { color: var(--d-label); }
    .dash .empty-note { color: var(--d-label); font-size: 12px; margin-top: auto; }

    /* ---- KPI cards (owner accent left border) ---- */
    .dash .kpi { border-left: 3px solid var(--c, #5a6070); }
    .dash .kpi .t-label { margin-bottom: 6px; }

    /* ---- owner dot ---- */
    .dash .dot {
      display: inline-block;
      width: 6px; height: 6px;
      margin-right: 6px;
      vertical-align: 1px;
      background: var(--c, #5a6070);
    }

    /* ---- simple stat rows (gap-to-leader, luck, schedule) ---- */
    .dash .rows { display: flex; flex-direction: column; gap: 7px; margin-top: 2px; }
    .dash .row  { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dash .row .nm { color: #c7ccd8; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash .row .rk { color: var(--d-label); width: 14px; font-size: 12px; font-variant-numeric: tabular-nums; }
    .dash .row .val { color: var(--d-num); font-variant-numeric: tabular-nums; font-weight: 600; }

    /* ---- badges ---- */
    .dash .badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
    .dash .badge.good { background: rgba(61,217,160,0.10); color: #3dd9a0; }
    .dash .badge.bad  { background: rgba(224,85,85,0.10);  color: #e05555; }
    .dash .badge.flat { background: rgba(90,96,112,0.12);  color: #8890a4; }

    /* ---- elimination chips ---- */
    .dash .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .dash .chip  { display: inline-flex; align-items: center; gap: 0; }
    .dash .chip .flag { margin-right: 0; width: 22px; height: 16px; }
    .dash .chip.dead { opacity: 0.3; text-decoration: line-through; }

    /* ---- progress bar (dependency) ---- */
    .dash .pbar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 9px; }
    .dash .pbar > span { display: block; height: 100%; background: var(--c, #5a6070); }

    /* ---- draft tile body ---- */
    .dash .draft-team { color: #c7ccd8; font-size: 12.5px; margin-top: 6px; }
    .dash .draft-meta { color: var(--d-label); font-size: 11.5px; margin-top: 3px; }

    /* ---- h2h ---- */
    .dash .h2h-vs { color: #c7ccd8; font-size: 13px; font-weight: 600; }
    .dash .h2h-rec { color: var(--d-num); font-size: 18px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
    .dash .h2h-line { color: var(--d-label2); font-size: 12px; margin-top: 4px; }

    /* ---- golden boot ---- */
    .dash .boot { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
    .dash .boot-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dash .boot-row .rk { color: var(--d-label); width: 14px; font-variant-numeric: tabular-nums; }
    .dash .boot-row .nm { color: #c7ccd8; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash .boot-row .g  { color: var(--d-num); font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ---- model accuracy stacked stats ---- */
    .dash .stat3 { display: flex; flex-direction: column; gap: 12px; margin-top: 2px; }
    .dash .stat3 .s-num { color: var(--d-num); font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .dash .stat3 .s-lbl { color: var(--d-label); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ---- chart wraps ---- */
    .dash .chart-sm  { position: relative; height: 150px; margin-top: 4px; }
    .dash .chart-xs  { position: relative; height: 100px; margin-top: 4px; }

    /* ---- trend legend ---- */
    .dash .legend { display: flex; flex-wrap: wrap; gap: 14px; }
    .dash .legend span { color: var(--d-label2); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }

    /* ---- rome quotes (floating, no card) ---- */
    .dash .rome {
      margin: 0;
      padding: 2px 0 2px 14px;
      border-left: 2px solid var(--d-gap);
      color: var(--d-label);
      font-style: italic;
      font-size: 13px;
      line-height: 1.5;
    }
    .dash .rome cite { font-style: normal; color: var(--d-label); opacity: 0.8; }

    /* ---- responsive ---- */
    @media (max-width: 640px) {
      .dash .g-race { grid-template-columns: repeat(6, 1fr); }
      .dash .g-race .span3 { grid-column: span 2; }   /* 3 KPI per row -> 3 + 2 */
      .dash .g-race .span5 { grid-column: span 6; }   /* winprob / gap / mover full width */
      .dash .g5 { grid-template-columns: repeat(6, 1fr); }
      .dash .g5 > .tile:not(.tile-head) { grid-column: span 2; } /* 3 + 2 */
      .dash .g4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 400px) {
      .dash .g-race,
      .dash .g-race .span3,
      .dash .g-race .span5,
      .dash .g5,
      .dash .g5 > .tile:not(.tile-head),
      .dash .g4 { grid-template-columns: 1fr; grid-column: auto; }
    }
  </style>
</head>
