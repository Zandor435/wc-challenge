name: Update standings from API-Football

# Fetches live World Cup results, rescoring the pool, and commits the refreshed
# JSON so the site (GitHub Pages / Netlify) redeploys automatically.
#
# Runs once nightly during the tournament window and on demand. Until API-Football
# populates the 2026 season, the fetch returns 0 matches and nothing is committed —
# safe to leave running.

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC (01:00 ET) — single nightly run, catches all of the prior day's matches incl. latest kickoffs
  workflow_dispatch:
    inputs:
      season:
        description: "Season to fetch"
        default: "2026"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install numpy   # win_probability.py's Monte Carlo engine needs numpy
      - name: Fetch + score
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python scripts/build.py --fetch --season "${{ github.event.inputs.season || '2026' }}"
      - name: Update win probability timeline
        # Runs AFTER scoring. Locks the results scoring.py just consumed and
        # simulates the remaining matches forward (5,000 sims). --skip-if-empty
        # means the pre-tournament cron (0 finished matches) leaves timeline.json
        # alone; the committed preseason Day-0 entry stays as the chart's origin.
        run: |
          python win_probability.py --results data/live_results.json --skip-if-empty
      - name: Update player goals (Golden Boot)
        # Pulls goal events (scratch --out, so live_results.json and the win-prob
        # step above are untouched) into data/goals.json, then aggregates scorers
        # on drafted teams into site/data/player_goals.json. continue-on-error so a
        # goals fetch / quota hiccup can never block the standings+timeline commit.
        continue-on-error: true
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python fetch_results.py --season "${{ github.event.inputs.season || '2026' }}" --with-goals --out data/_goals_scratch.json
          python player_goals.py --goals data/goals.json --out site/data/player_goals.json
      - name: Kickoff gate
        # The narrative engine is the one part of this pipeline that ACCUMULATES
        # (narrative_state.json + tournament_recap.md build on themselves). Before
        # the tournament kicks off, daily_results.json still holds fake test
        # fixtures, so running the engine would overwrite the committed Day-0
        # preseason baseline with artifacts of fake data.
        #
        # Same spirit as win_probability.py --skip-if-empty: skip the work until
        # there is real tournament data. This is a DATE gate (kickoff = 2026-06-11
        # UTC), so it is automatic and self-removing — once the date passes it runs
        # with no edit needed. No manual cleanup required.
        id: kickoff
        run: |
          TODAY=$(date -u +%Y%m%d)
          if [ "$TODAY" -ge 20260611 ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"
            echo "Past kickoff ($TODAY >= 20260611) — running the narrative engine."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Preseason ($TODAY < 20260611) — skipping narrative engine; preserving the Day-0 baseline."
          fi
      - name: Build narrative state
        # Runs AFTER scoring/win-prob/goals, BEFORE commentary. Distils every data
        # file into site/data/narrative_state.json (streaks, head-to-heads, notable
        # events, auto-tagged themes, phase context) — the accumulating memory the
        # stateful commentary engine reads. Stdlib only; no API key needed.
        if: steps.kickoff.outputs.run == 'true'
        run: |
          python build_narrative_state.py --generated "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Generate pundit commentary + Jim Rome column
        # Reads narrative_state.json (fresh, above) + the previous tournament_recap.md
        # and writes the next installment, plus the cold-take commentary.json.
        if: steps.kickoff.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_commentary.py --model gpt-4o --generated "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
      - name: Commit refreshed data if changed
        run: |
          git config user.name  "wc-challenge-bot"
          git config user.email "actions@github.com"
          git add site/data/*.json site/data/tournament_recap.md commentary.json
          if git diff --staged --quiet; then
            echo "No standings changes."
          else
            git commit -m "Auto-update standings ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
