name: Deploy site to GitHub Pages

# Live-URL stopgap so standings are visible immediately. The primary target is
# Netlify (see netlify.toml); this serves the identical static site from ./site.
# Pushing updated site/data/*.json redeploys automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run any still-Node20 JavaScript actions under the Node.js 24 runtime that
# GitHub is forcing in June 2026, so the migration can't hard-fail the deploy.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
